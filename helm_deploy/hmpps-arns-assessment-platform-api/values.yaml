generic-service:
  nameOverride: hmpps-arns-assessment-platform-api
  serviceAccountName: hmpps-arns-assessment-platform-service-account
  productId: "HMPPS509" # productId for the product that this belongs too, i.e. DPS001, see README.md for details

  image:
    repository: ghcr.io/ministryofjustice/hmpps-arns-assessment-platform-api
    tag: app_version # override at deployment time
    port: 8080

  ingress:
    enabled: true
    host: app-hostname.local # override per environment
    tlsSecretName: hmpps-arns-assessment-platform-api-cert
    modsecurity_enabled: true
    modsecurity_audit_enabled: true
    modsecurity_snippet: |
      SecRuleEngine DetectionOnly
      # Team here grants access to the OpenSearch logs to delve into the cause of the blockage
      SecDefaultAction "phase:2,pass,log,tag:github_team=hmpps-assessments,tag:namespace={{ .Release.Namespace }}"
      # Disables request body scanning so free-text form fields (goal titles, step descriptions) do not trigger false positives
      SecRuleUpdateTargetById 920272 "!REQUEST_BODY"
      # Block Detectify scanner with 418
      SecRule REQUEST_HEADERS:User-Agent "@pm detectify Detectify DETECTIFY" "id:800003,phase:1,deny,status:418,log,tag:github_team=hmpps-assessments,tag:namespace={{ .Release.Namespace }}"
      # Change default denial to be a 406 so that we can tell easily that it is modsecurity doing the blocking
      SecRuleUpdateActionById 949110 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecRuleUpdateActionById 959100 "t:none,deny,status:406,logdata:%{SERVER_NAME}"
      SecAction "id:900000,phase:1,nolog,pass,t:none,setvar:tx.paranoia_level=2"

  # Environment variables to load into the deployment
  env:
    JAVA_OPTS: "-Xmx512m"
    SERVER_PORT: "8080"
    SPRING_PROFILES_ACTIVE: "postgres"
    APPLICATIONINSIGHTS_CONFIGURATION_FILE: applicationinsights.json
    CACHE_REDIS_SSL_ENABLED: "true"

  # Pre-existing kubernetes secrets to load as environment variables in the deployment.
  # namespace_secrets:
  #   [name of kubernetes secret]:
  #     [name of environment variable as seen by app]: [key of kubernetes secret to load]

  namespace_secrets:
    hmpps-arns-assessment-platform-api-application-insights:
      APPLICATIONINSIGHTS_CONNECTION_STRING: "APPLICATIONINSIGHTS_CONNECTION_STRING"

    hmpps-arns-assessment-platform-api-client-creds:
      API_CLIENT_ID: 'API_CLIENT_ID'
      API_CLIENT_SECRET: 'API_CLIENT_SECRET'

    rds-aurora-instance-output:
      DATABASE_USERNAME: "database_username"
      DATABASE_PASSWORD: "database_password"
      DATABASE_NAME: "database_name"
      DATABASE_ENDPOINT: "rds_cluster_endpoint"

    sqs-hmpps-audit-secret:
      HMPPS_SQS_QUEUES_AUDIT_QUEUE_NAME: "sqs_queue_name"

    assessment-query-cache-elasticache-redis:
      CACHE_REDIS_HOST: 'primary_endpoint_address'
      CACHE_REDIS_AUTH_TOKEN: 'auth_token'

  allowlist:
    groups:
      - internal

  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 80
    scaleUpStabilizationWindowSeconds: 60

generic-prometheus-alerts:
  targetApplication: hmpps-arns-assessment-platform-api

global:
  environment: ""

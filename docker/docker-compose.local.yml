# `docker-compose.local.yml` defines services that must be run locally
# to support a fully self-contained local development environment.

services:
  aap-api:
    image: ghcr.io/ministryofjustice/hmpps-arns-assessment-platform-api:local
    build:
      target: development
    command: gradle --parallel --build-cache --configuration-cache --info bootRun
    volumes:
      - ../.git:/app/.git
      - ../.gradle:/home/gradle/.gradle
      - ../build:/app/build
      - ../src:/app/src
      - ../build.gradle.kts:/app/build.gradle.kts
      - ../settings.gradle.kts:/app/settings.gradle.kts
      - ../glowroot-data:/opt/glowroot/data
    ports:
      - '5006:5005'
      - '4000:4000'
      - '4001:4001'

volumes:
  .gradle:
  build:
